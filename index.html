<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFFM - Online Radio</title>
    <style>
        :root {
            --primary: #00ff88;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .player-card {
            background: var(--card);
            padding: 2rem;
            border-radius: 1.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            width: 100%;
            max-width: 400px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo-area {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, var(--primary), #00bcff);
            border-radius: 50%;
            margin: 0 auto 1.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.5rem;
            font-weight: 800;
            color: #0f172a;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
        }

        h1 { margin: 0; font-size: 2rem; letter-spacing: -1px; }
        .status { color: var(--primary); font-size: 0.875rem; font-weight: 600; margin-bottom: 2rem; text-transform: uppercase; }

        /* Modern Audio Player Styling */
        audio {
            width: 100%;
            height: 45px;
            filter: invert(100%) hue-rotate(180deg) brightness(1.5);
            margin-bottom: 1rem;
        }

        .warning-box {
            background: rgba(245, 158, 11, 0.1);
            border: 1px solid rgba(245, 158, 11, 0.3);
            color: #fbbf24;
            padding: 1rem;
            border-radius: 0.75rem;
            font-size: 0.8rem;
            margin-top: 1.5rem;
            display: none; /* Hidden by default, shown via JS if error detected */
        }

        .btn-direct {
            display: inline-block;
            margin-top: 1rem;
            color: var(--primary);
            text-decoration: none;
            font-size: 0.875rem;
            border-bottom: 1px solid var(--primary);
        }
    </style>
</head>
<body>

<div class="player-card">
    <div class="logo-area">NF</div>
    <h1>NFFM</h1>
    <div class="status">● Live on Air</div>

    <audio id="radioPlayer" controls>
        <source src="http://37.157.242.104:34275/;stream" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>

    <div id="securityWarning" class="warning-box">
        <strong>Player not starting?</strong><br>
        Chrome is blocking the stream. Click the 🔒 (Padlock) in your URL bar > Site Settings > Set "Insecure Content" to <strong>Allow</strong>.
    </div>

    <a href="http://37.157.242.104:34275/stream" target="_blank" class="btn-direct">Open Direct Stream Link</a>
</div>

<script>
    const player = document.getElementById('radioPlayer');
    const warning = document.getElementById('securityWarning');

    // Show warning after 3 seconds if player is stuck or error occurs
    player.onerror = function() {
        warning.style.display = 'block';
    };
    
    setTimeout(() => {
        if (player.networkState === 3 || player.readyState === 0) {
            warning.style.display = 'block';
        }
    }, 3000);
</script>

</body>
</html>
